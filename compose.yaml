services:

  auth-server:
    build: .
    ports:
      - "9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_PASSWORD: ${DB_PASSWORD:-localpassword}
    depends_on:
      postgresql:
        condition: service_healthy
    restart: on-failure

  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nthnode_auth_db
      POSTGRES_USER: nthnode_auth
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nthnode_auth -d nthnode_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
