services:

  auth-server:
    build: .
    ports:
      - "9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_PASSWORD: ${DB_PASSWORD:-localpassword}
    depends_on:
      postgresql:
        condition: service_healthy
    restart: on-failure

  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - calibre_config:/config
      - ./books:/books
    ports:
      - "8083:8083"
    restart: unless-stopped

  drawio:
    image: jgraph/drawio:latest
    ports:
      - "8888:8080"
    environment:
      - DRAWIO_BASE_URL=http://localhost:8888
      - DRAWIO_OIDC_ENABLED=1
      - DRAWIO_OIDC_ISSUER=http://host.docker.internal:9000
      - DRAWIO_OIDC_CLIENT_ID=drawio
      - DRAWIO_OIDC_CLIENT_SECRET=drawio-secret
    restart: unless-stopped

volumes:
  postgres_data:
  calibre_config:
