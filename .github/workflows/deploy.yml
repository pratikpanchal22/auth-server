name: Deploy to Production

on:
  push:
    branches: [main]

# Required for GitHub OIDC token exchange with AWS
permissions:
  id-token: write
  contents: read

env:
  INSTANCE_ID: i-09c1e7b0b0163d2a2
  AWS_REGION: us-west-2
  S3_KEY: s3://nthnode-backups/deployments/auth-server/app.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build JAR
        run: ./mvnw -q clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::439563880773:role/nthnode-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload JAR to S3
        run: aws s3 cp target/auth-server-0.0.1-SNAPSHOT.jar ${{ env.S3_KEY }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp ${{ env.S3_KEY }} /opt/auth-server/app.jar --region ${{ env.AWS_REGION }}",
              "chown appuser:appuser /opt/auth-server/app.jar",
              "systemctl restart auth-server",
              "sleep 5",
              "systemctl is-active auth-server"
            ]' \
            --region "$AWS_REGION" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/36] $STATUS"
            case "$STATUS" in
              Success) echo "Deploy succeeded"; exit 0 ;;
              Failed|TimedOut|Cancelled)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$AWS_REGION" \
                  --query "StandardErrorContent" \
                  --output text
                exit 1 ;;
            esac
            sleep 5
          done

          echo "Timed out waiting for SSM command"
          exit 1
