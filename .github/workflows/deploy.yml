name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub OIDC token exchange with AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  S3_KEY: s3://nthnode-backups/deployments/auth-server/app.jar
  INSTANCE_TAG: nthnode-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build JAR
        run: ./mvnw -q clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::439563880773:role/nthnode-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload JAR to S3
        run: aws s3 cp target/auth-server-0.0.1-SNAPSHOT.jar ${{ env.S3_KEY }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Name,Values=$INSTANCE_TAG" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp ${{ env.S3_KEY }} /opt/auth-server/app.jar --region ${{ env.AWS_REGION }}",
              "chown appuser:appuser /opt/auth-server/app.jar",
              "systemctl restart auth-server",
              "sleep 5",
              "systemctl is-active auth-server"
            ]' \
            --region "$AWS_REGION" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 36); do
            sleep 5
            INVOCATIONS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --region "$AWS_REGION" \
              --query "CommandInvocations[*].{Instance:InstanceId,Status:Status}" \
              --output json)

            echo "[$i/36] $INVOCATIONS"

            PENDING=$(echo "$INVOCATIONS" | jq '[.[] | select(.Status == "Pending" or .Status == "InProgress")] | length')
            FAILED=$(echo "$INVOCATIONS" | jq '[.[] | select(.Status == "Failed" or .Status == "TimedOut" or .Status == "Cancelled")] | length')

            if [ "$PENDING" -eq 0 ] && [ "$FAILED" -eq 0 ]; then
              echo "All instances deployed successfully"
              exit 0
            fi

            if [ "$FAILED" -gt 0 ]; then
              echo "Deploy failed on $FAILED instance(s)"
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --region "$AWS_REGION" \
                --details \
                --query "CommandInvocations[?Status!='Success'].{Instance:InstanceId,Status:Status,Error:CommandPlugins[0].Output}" \
                --output table
              exit 1
            fi
          done

          echo "Timed out waiting for SSM command"
          exit 1
