# Local development profile — PostgreSQL via Docker Compose
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=auth_user
spring.datasource.password=${DB_PASSWORD:localpassword}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Auth server public base URL — used in OIDC issuer claim
auth.server.base-url=http://localhost:9000

logging.level.io.github.pratikpanchal22=DEBUG
logging.level.org.springframework.security=DEBUG

# --- Google OIDC (PR-08) ---
# 1. Create a project at console.cloud.google.com
# 2. APIs & Services → Credentials → OAuth 2.0 Client ID (Web application)
#    Authorized redirect URI: http://localhost:9000/login/oauth2/code/google
# 3. Seed the IDP row (run once against local DB):
#
# INSERT INTO identity_providers (name, issuer_url, client_id, client_secret_ref, scopes, email_domains, enabled)
# VALUES (
#   'google',
#   'https://accounts.google.com',
#   '<YOUR_GOOGLE_CLIENT_ID>',
#   '<YOUR_GOOGLE_CLIENT_SECRET>',
#   'openid,profile,email',
#   'gmail.com,googlemail.com',
#   true
# );
#
# Then visit http://localhost:9000/login and enter a @gmail.com address — it will route to Google.
