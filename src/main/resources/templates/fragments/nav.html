<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar border-bottom" style="background: var(--nt-surface, #fff);">
    <div class="container">
        <a th:href="${storefrontUrl}" class="navbar-brand fw-semibold text-decoration-none" style="font-size:1.1rem;">
            nthNode <span style="color:var(--nt-blue,#1a73e8)">Auth Server</span>
        </a>
        <div class="d-flex align-items-center gap-3">
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}"
               class="btn btn-sm" style="background:var(--nt-blue,#1a73e8);color:#fff;border-radius:24px;">
                Admin
            </a>
            <a th:href="@{/account}" class="d-flex align-items-center gap-2 text-muted small text-decoration-none">
                <img th:if="${avatarUrl != null}" th:src="${avatarUrl}"
                     referrerpolicy="no-referrer"
                     style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="">
                <span th:text="${displayName}">user</span>
            </a>
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme"
                    aria-label="Toggle dark mode"
                    style="position:static;box-shadow:none;border-color:var(--nt-border);width:32px;height:32px;font-size:.9rem;">
                <span id="themeIcon">☀️</span>
            </button>
            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-sm btn-outline-secondary" style="border-radius:24px;">Sign out</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
