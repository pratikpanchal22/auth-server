<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: .75rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card shadow-sm" style="width: 380px;">
        <div class="card-body p-4 p-md-5">

            <h4 class="fw-semibold mb-1">Sign in</h4>
            <p class="text-muted small mb-4">Auth Server</p>

            <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                You have been signed out.
            </div>

            <form th:action="@{/login}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="email" class="form-label fw-medium">Email address</label>
                    <input type="email" class="form-control" id="email" name="email"
                           autocomplete="email" autofocus required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-medium">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Sign in</button>
            </form>

        </div>
    </div>

</body>
</html>
