<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand fw-semibold">Auth Server</span>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-white-50 small" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-light btn-sm">Sign out</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm border-0" style="max-width: 480px;">
            <div class="card-body p-4">
                <h5 class="card-title">Signed in</h5>
                <p class="card-text text-muted">
                    Authenticated as <strong th:text="${email}">user@example.com</strong>
                </p>
                <hr>
                <p class="small text-muted mb-0">
                    This auth server issues tokens to connected applications via OIDC.
                    Client apps redirect here for authentication — you will not normally
                    land on this page during a normal login flow.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
