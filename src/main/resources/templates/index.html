<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Server · nthNode</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar border-bottom" style="background: var(--nt-surface, #fff);">
        <div class="container">
            <span class="navbar-brand fw-semibold" style="font-size:1.1rem;">
                nthNode <span style="color:var(--nt-blue,#1a73e8)">Auth Server</span>
            </span>
            <div class="d-flex align-items-center gap-3">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}"
                   class="btn btn-sm" style="background:var(--nt-blue,#1a73e8);color:#fff;border-radius:24px;">
                    Admin
                </a>
                <span class="text-muted small" sec:authentication="name">user</span>
                <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme"
                        aria-label="Toggle dark mode"
                        style="position:static;box-shadow:none;border-color:var(--nt-border);width:32px;height:32px;font-size:.9rem;">
                    <span id="themeIcon">☀️</span>
                </button>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-outline-secondary" style="border-radius:24px;">Sign out</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 57px);">
        <div class="card text-center" style="width:460px;">
            <div class="card-body p-4 p-md-5">
                <div class="mb-3" style="font-size:2.5rem;">✓</div>
                <h5 class="fw-semibold mb-1">Signed in</h5>
                <p class="text-muted small mb-0">
                    Authenticated as <strong th:text="${email}">user@example.com</strong>
                </p>
                <hr class="my-4">
                <p class="text-muted small mb-0">
                    This auth server issues tokens to connected applications via OIDC.
                    Client apps redirect here for authentication — you will not normally land on this page.
                </p>
            </div>
        </div>
    </div>

    <script src="/js/theme.js"></script>
</body>
</html>
