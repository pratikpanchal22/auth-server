<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Identity Providers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<nav th:replace="~{admin/fragments :: topNav}"></nav>

<div class="d-flex">
    <aside th:replace="~{admin/fragments :: sidebar('idps')}"></aside>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Identity Providers</h4>
            <a th:href="@{/admin/idps/new}" class="btn btn-primary btn-sm">+ New IDP</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Issuer URL</th>
                            <th>Client ID</th>
                            <th>Email Domains</th>
                            <th>Enabled</th>
                            <th>Created</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="idp : ${idps}">
                            <td class="fw-medium" th:text="${idp.name}"></td>
                            <td class="text-muted small text-truncate" style="max-width: 220px;"
                                th:text="${idp.issuerUrl}" th:title="${idp.issuerUrl}"></td>
                            <td class="text-muted small" th:text="${idp.clientId}"></td>
                            <td class="text-muted small" th:text="${idp.emailDomains != null ? idp.emailDomains : '—'}"></td>
                            <td>
                                <span th:if="${idp.enabled}" class="badge bg-success">Yes</span>
                                <span th:unless="${idp.enabled}" class="badge bg-secondary">No</span>
                            </td>
                            <td class="text-muted small" th:text="${#temporals.format(idp.createdAt, 'yyyy-MM-dd')}"></td>
                            <td class="text-end">
                                <a th:href="@{/admin/idps/{id}/edit(id=${idp.id})}"
                                   class="btn btn-outline-secondary btn-sm me-1">Edit</a>
                                <form th:action="@{/admin/idps/{id}/delete(id=${idp.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('Delete this identity provider?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(idps)}">
                            <td colspan="7" class="text-center text-muted py-4">No identity providers configured</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmJo6JQNWXnMBQv0lTHR7HoFW/s"
        crossorigin="anonymous"></script>
</body>
</html>
