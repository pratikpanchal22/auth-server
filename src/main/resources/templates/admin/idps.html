<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Providers · Admin</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
</head>
<body class="antialiased">

<aside th:replace="~{admin/fragments :: sidebar('idps')}"></aside>

<div class="page-wrapper">
    <div class="page-header d-print-none">
        <div class="container-xl">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <h2 class="page-title">Identity Providers</h2>
                </div>
                <div class="col-auto ms-auto">
                    <a th:href="@{/admin/idps/new}" class="btn btn-primary">
                        <i class="ti ti-plus me-1"></i> New IDP
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="container-xl">

            <div th:if="${success}" class="alert alert-success alert-dismissible" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-vcenter card-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Issuer URL</th>
                                <th>Client ID</th>
                                <th>Email Domains</th>
                                <th>Enabled</th>
                                <th>Created</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="idp : ${idps}">
                                <td class="fw-medium" th:text="${idp.name}"></td>
                                <td class="text-muted small text-truncate" style="max-width:220px;"
                                    th:text="${idp.issuerUrl}" th:title="${idp.issuerUrl}"></td>
                                <td class="text-muted small" th:text="${idp.clientId}"></td>
                                <td class="text-muted small"
                                    th:text="${idp.emailDomains != null ? idp.emailDomains : '—'}"></td>
                                <td>
                                    <span th:if="${idp.enabled}" class="badge bg-success-lt text-success">Yes</span>
                                    <span th:unless="${idp.enabled}" class="badge bg-secondary-lt text-secondary">No</span>
                                </td>
                                <td class="text-muted small"
                                    th:text="${#temporals.format(idp.createdAt, 'yyyy-MM-dd')}"></td>
                                <td class="text-end">
                                    <a th:href="@{/admin/idps/{id}/edit(id=${idp.id})}"
                                       class="btn btn-ghost-secondary btn-sm btn-icon me-1" title="Edit">
                                        <i class="ti ti-edit"></i>
                                    </a>
                                    <form th:action="@{/admin/idps/{id}/delete(id=${idp.id})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-ghost-danger btn-sm btn-icon" title="Delete"
                                                onclick="return confirm('Delete this identity provider?')">
                                            <i class="ti ti-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(idps)}">
                                <td colspan="7" class="text-center text-muted py-4">No identity providers configured</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
<script src="/js/theme.js"></script>
</body>
</html>
