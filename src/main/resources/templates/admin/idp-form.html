<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editMode} ? 'Admin · Edit IDP' : 'Admin · New IDP'">Admin · IDP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<nav th:replace="~{admin/fragments :: topNav}"></nav>

<div class="d-flex">
    <aside th:replace="~{admin/fragments :: sidebar('idps')}"></aside>

    <main class="flex-grow-1 p-4">
        <div class="d-flex align-items-center gap-2 mb-3">
            <a th:href="@{/admin/idps}" class="btn btn-outline-secondary btn-sm">← Back</a>
            <h4 class="mb-0" th:text="${editMode} ? 'Edit Identity Provider' : 'New Identity Provider'">IDP</h4>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body p-4">
                <form th:action="${editMode} ? @{/admin/idps/{id}(id=${idpId})} : @{/admin/idps}"
                      th:object="${form}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label for="name" class="form-label fw-medium">Name</label>
                        <input type="text" class="form-control" id="name" name="name"
                               th:value="*{name}" th:readonly="${editMode}" required
                               placeholder="e.g. Google, GitHub, nthnode">
                        <div th:if="${editMode}" class="form-text text-muted">Name cannot be changed after creation.</div>
                    </div>

                    <div class="mb-3">
                        <label for="issuerUrl" class="form-label fw-medium">Issuer URL</label>
                        <input type="url" class="form-control" id="issuerUrl" name="issuerUrl"
                               th:value="*{issuerUrl}" required
                               placeholder="https://accounts.google.com">
                        <div class="form-text text-muted">OIDC issuer — must expose <code>/.well-known/openid-configuration</code></div>
                    </div>

                    <div class="mb-3">
                        <label for="clientId" class="form-label fw-medium">Client ID</label>
                        <input type="text" class="form-control" id="clientId" name="clientId"
                               th:value="*{clientId}" required autocomplete="off">
                    </div>

                    <div class="mb-3">
                        <label for="clientSecretRef" class="form-label fw-medium">Client Secret / AWS Secrets ARN</label>
                        <input type="text" class="form-control" id="clientSecretRef" name="clientSecretRef"
                               th:value="*{clientSecretRef}" autocomplete="off"
                               placeholder="arn:aws:secretsmanager:us-east-1:…  or  raw-secret (dev only)">
                        <div class="form-text text-muted">In production, store the secret in AWS Secrets Manager and paste the ARN here.</div>
                    </div>

                    <div class="mb-3">
                        <label for="scopes" class="form-label fw-medium">Scopes</label>
                        <input type="text" class="form-control" id="scopes" name="scopes"
                               th:value="*{scopes}" required
                               placeholder="openid,profile,email">
                        <div class="form-text text-muted">Comma-separated OIDC scopes.</div>
                    </div>

                    <div class="mb-3">
                        <label for="emailDomains" class="form-label fw-medium">Email Domains <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="text" class="form-control" id="emailDomains" name="emailDomains"
                               th:value="*{emailDomains}"
                               placeholder="example.com,corp.example.com">
                        <div class="form-text text-muted">Restrict login to these domains. Leave blank to allow all.</div>
                    </div>

                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="enabled"
                                   name="enabled" value="true" th:checked="*{enabled}">
                            <label class="form-check-label fw-medium" for="enabled">Enabled</label>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"
                                th:text="${editMode} ? 'Save Changes' : 'Create IDP'">Save</button>
                        <a th:href="@{/admin/idps}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmJo6JQNWXnMBQv0lTHR7HoFW/s"
        crossorigin="anonymous"></script>
</body>
</html>
