<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editMode} ? 'Edit IDP · Admin' : 'New IDP · Admin'">IDP · Admin</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
</head>
<body class="antialiased">

<aside th:replace="~{admin/fragments :: sidebar('idps')}"></aside>

<div class="page-wrapper">
    <div class="page-header d-print-none">
        <div class="container-xl">
            <div class="row g-2 align-items-center">
                <div class="col-auto">
                    <a th:href="@{/admin/idps}" class="btn btn-ghost-secondary btn-sm btn-icon">
                        <i class="ti ti-arrow-left"></i>
                    </a>
                </div>
                <div class="col">
                    <h2 class="page-title"
                        th:text="${editMode} ? 'Edit Identity Provider' : 'New Identity Provider'">IDP</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="container-xl">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

                    <div class="card">
                        <div class="card-body">
                            <form th:action="${editMode} ? @{/admin/idps/{id}(id=${idpId})} : @{/admin/idps}"
                                  th:object="${form}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <div class="mb-3">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="name" name="name"
                                           th:value="*{name}" th:readonly="${editMode}" required
                                           placeholder="e.g. google, github, okta">
                                    <div th:if="${editMode}" class="form-hint">Name cannot be changed after creation.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="issuerUrl" class="form-label">Issuer URL</label>
                                    <input type="url" class="form-control" id="issuerUrl" name="issuerUrl"
                                           th:value="*{issuerUrl}" required
                                           placeholder="https://accounts.google.com">
                                    <div class="form-hint">OIDC issuer — must expose <code>/.well-known/openid-configuration</code></div>
                                </div>

                                <div class="mb-3">
                                    <label for="clientId" class="form-label">Client ID</label>
                                    <input type="text" class="form-control" id="clientId" name="clientId"
                                           th:value="*{clientId}" required autocomplete="off">
                                </div>

                                <div class="mb-3">
                                    <label for="clientSecretRef" class="form-label">Client Secret / AWS Secrets ARN</label>
                                    <input type="text" class="form-control" id="clientSecretRef" name="clientSecretRef"
                                           th:value="*{clientSecretRef}" autocomplete="off"
                                           placeholder="arn:aws:secretsmanager:us-east-1:…  or  raw-secret (dev only)">
                                    <div class="form-hint">In production, store the secret in AWS Secrets Manager and paste the ARN here.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="scopes" class="form-label">Scopes</label>
                                    <input type="text" class="form-control" id="scopes" name="scopes"
                                           th:value="*{scopes}" required placeholder="openid,profile,email">
                                    <div class="form-hint">Comma-separated OIDC scopes.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="emailDomains" class="form-label">
                                        Email Domains <span class="text-muted fw-normal">(optional)</span>
                                    </label>
                                    <input type="text" class="form-control" id="emailDomains" name="emailDomains"
                                           th:value="*{emailDomains}"
                                           placeholder="example.com,corp.example.com">
                                    <div class="form-hint">Restrict login to these domains. Leave blank to allow all.</div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                               name="enabled" value="true" th:checked="*{enabled}">
                                        <span class="form-check-label">Enabled</span>
                                    </label>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary"
                                            th:text="${editMode} ? 'Save Changes' : 'Create IDP'">Save</button>
                                    <a th:href="@{/admin/idps}" class="btn btn-ghost-secondary">Cancel</a>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
<script src="/js/theme.js"></script>
</body>
</html>
