<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<!--
  Tabler sidebar — replaces the old Bootstrap dark navbar + separate topNav.
  Sign-out and home link live in the sidebar footer.
  topNav fragment is kept as an empty stub for any legacy references.
-->

<nav th:fragment="topNav"></nav>

<aside th:fragment="sidebar(active)"
       class="navbar navbar-vertical navbar-expand-lg"
       data-bs-theme="dark">
    <div class="container-fluid">

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbar-menu"
                aria-controls="navbar-menu" aria-expanded="false">
            <span class="navbar-toggler-icon"></span>
        </button>

        <h1 class="navbar-brand navbar-brand-autodark mb-0">
            <span class="fw-semibold" style="font-size:1rem;">
                Auth Server <span class="text-yellow">· Admin</span>
            </span>
        </h1>

        <div class="collapse navbar-collapse" id="navbar-menu">
            <ul class="navbar-nav pt-lg-3">

                <li class="nav-item">
                    <a th:href="@{/admin/users}"
                       th:class="${active == 'users'} ? 'nav-link active' : 'nav-link'">
                        <span class="nav-link-icon d-md-none d-lg-block">
                            <i class="ti ti-users"></i>
                        </span>
                        <span class="nav-link-title">Users</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a th:href="@{/admin/idps}"
                       th:class="${active == 'idps'} ? 'nav-link active' : 'nav-link'">
                        <span class="nav-link-icon d-md-none d-lg-block">
                            <i class="ti ti-building-community"></i>
                        </span>
                        <span class="nav-link-title">Identity Providers</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a th:href="@{/admin/clients}"
                       th:class="${active == 'clients'} ? 'nav-link active' : 'nav-link'">
                        <span class="nav-link-icon d-md-none d-lg-block">
                            <i class="ti ti-apps"></i>
                        </span>
                        <span class="nav-link-title">OAuth Clients</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a th:href="@{/admin/audit}"
                       th:class="${active == 'audit'} ? 'nav-link active' : 'nav-link'">
                        <span class="nav-link-icon d-md-none d-lg-block">
                            <i class="ti ti-clipboard-list"></i>
                        </span>
                        <span class="nav-link-title">Audit Log</span>
                    </a>
                </li>

            </ul>

            <!-- Sidebar footer: user + sign-out -->
            <div class="mt-auto border-top pt-3 pb-1">
                <div class="d-flex align-items-center justify-content-between px-2">
                    <span class="d-flex align-items-center gap-2 text-white-50 small">
                        <img th:if="${avatarUrl != null}" th:src="${avatarUrl}"
                             referrerpolicy="no-referrer"
                             style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="">
                        <span th:text="${displayName}">user</span>
                    </span>
                    <div class="d-flex gap-1 align-items-center">
                        <button class="btn btn-ghost-light btn-sm btn-icon" onclick="toggleTheme()" title="Toggle theme">
                            <i id="themeIcon" class="ti ti-sun"></i>
                        </button>
                        <a th:href="@{/}" class="btn btn-ghost-light btn-sm btn-icon" title="Back to home">
                            <i class="ti ti-home"></i>
                        </a>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-ghost-danger btn-sm btn-icon" title="Sign out">
                                <i class="ti ti-logout"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</aside>

</body>
</html>
