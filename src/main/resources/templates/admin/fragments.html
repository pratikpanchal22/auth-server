<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<nav th:fragment="topNav" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid px-4">
        <span class="navbar-brand fw-semibold">Auth Server <span class="text-warning">· Admin</span></span>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a href="/" class="text-white-50 small text-decoration-none">← Back to home</a>
            <span class="text-white-50 small" sec:authentication="name">user</span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<aside th:fragment="sidebar(active)"
       class="d-flex flex-column bg-white border-end py-3"
       style="width: 210px; min-width: 210px; min-height: calc(100vh - 56px);">
    <ul class="nav nav-pills flex-column px-2 gap-1">
        <li class="nav-item">
            <a th:href="@{/admin/users}"
               th:class="${active == 'users'} ? 'nav-link active' : 'nav-link text-dark'">Users</a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/idps}"
               th:class="${active == 'idps'} ? 'nav-link active' : 'nav-link text-dark'">Identity Providers</a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/clients}"
               th:class="${active == 'clients'} ? 'nav-link active' : 'nav-link text-dark'">OAuth Clients</a>
        </li>
    </ul>
</aside>

</body>
</html>
