<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · OAuth Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<nav th:replace="~{admin/fragments :: topNav}"></nav>

<div class="d-flex">
    <aside th:replace="~{admin/fragments :: sidebar('clients')}"></aside>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">OAuth Clients</h4>
        </div>

        <div class="alert alert-info small py-2 mb-3">
            OAuth clients are managed via <code>ClientDataLoader</code> in application code and seeded at startup.
            This view is read-only.
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Client ID</th>
                            <th>Scopes</th>
                            <th>Redirect URIs</th>
                            <th>Registered</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${clients}">
                            <td class="fw-medium text-monospace small" th:text="${c.client_id}"></td>
                            <td class="text-muted small" th:text="${c.scopes}"></td>
                            <td>
                                <div th:each="uri : ${#strings.arraySplit(c.redirect_uris != null ? c.redirect_uris : '', ',')}"
                                     class="text-muted small text-truncate" style="max-width: 320px;"
                                     th:text="${#strings.trim(uri)}" th:title="${#strings.trim(uri)}"></div>
                            </td>
                            <td class="text-muted small"
                                th:text="${c.client_id_issued_at != null ? c.client_id_issued_at.toString().substring(0, 10) : '—'}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(clients)}">
                            <td colspan="4" class="text-center text-muted py-4">No OAuth clients found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmJo6JQNWXnMBQv0lTHR7HoFW/s"
        crossorigin="anonymous"></script>
</body>
</html>
