<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Clients · Admin</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
</head>
<body class="antialiased">

<aside th:replace="~{admin/fragments :: sidebar('clients')}"></aside>

<div class="page-wrapper">
    <div class="page-header d-print-none">
        <div class="container-xl">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <h2 class="page-title">OAuth Clients</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="container-xl">

            <div class="alert alert-info" role="alert">
                <i class="ti ti-info-circle me-1"></i>
                Clients are seeded by <code>ClientDataLoader</code> at startup. This view is read-only.
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-vcenter card-table">
                        <thead>
                            <tr>
                                <th>Client ID</th>
                                <th>Scopes</th>
                                <th>Redirect URIs</th>
                                <th>Registered</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${clients}">
                                <td>
                                    <code class="fw-medium" th:text="${c.client_id}"></code>
                                </td>
                                <td class="text-muted small" th:text="${c.scopes}"></td>
                                <td>
                                    <div th:each="uri : ${#strings.arraySplit(c.redirect_uris != null ? c.redirect_uris : '', ',')}"
                                         class="text-muted small text-truncate" style="max-width:300px;"
                                         th:text="${#strings.trim(uri)}" th:title="${#strings.trim(uri)}"></div>
                                </td>
                                <td class="text-muted small"
                                    th:text="${c.client_id_issued_at != null ? c.client_id_issued_at.toString().substring(0,10) : '—'}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(clients)}">
                                <td colspan="4" class="text-center text-muted py-4">No OAuth clients found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
<script src="/js/theme.js"></script>
</body>
</html>
