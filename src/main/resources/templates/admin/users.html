<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<nav th:replace="~{admin/fragments :: topNav}"></nav>

<div class="d-flex">
    <aside th:replace="~{admin/fragments :: sidebar('users')}"></aside>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Users</h4>
            <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">+ New User</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Email</th>
                            <th>Type</th>
                            <th>Roles</th>
                            <th>Active</th>
                            <th>MFA</th>
                            <th>Created</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.email}" class="fw-medium"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${u.authType.name() == 'LOCAL'} ? 'bg-secondary' : 'bg-info text-dark'"
                                      th:text="${u.authType}"></span>
                            </td>
                            <td>
                                <span th:each="r, stat : ${u.roles}"
                                      class="badge bg-dark me-1"
                                      th:text="${r}"></span>
                            </td>
                            <td>
                                <span th:if="${u.active}" class="badge bg-success">Yes</span>
                                <span th:unless="${u.active}" class="badge bg-secondary">No</span>
                            </td>
                            <td>
                                <span th:if="${u.mfaEnabled}" class="badge bg-warning text-dark">On</span>
                                <span th:unless="${u.mfaEnabled}" class="badge bg-light text-muted border">Off</span>
                            </td>
                            <td class="text-muted small" th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd')}"></td>
                            <td class="text-end">
                                <a th:href="@{/admin/users/{id}/edit(id=${u.id})}"
                                   class="btn btn-outline-secondary btn-sm me-1">Edit</a>
                                <form th:if="${u.mfaEnabled}"
                                      th:action="@{/admin/users/{id}/reset-mfa(id=${u.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-outline-warning btn-sm me-1"
                                            onclick="return confirm('Reset MFA for this user?')">Reset MFA</button>
                                </form>
                                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('Delete this user?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" class="text-center text-muted py-4">No users found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmJo6JQNWXnMBQv0lTHR7HoFW/s"
        crossorigin="anonymous"></script>
</body>
</html>
