<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users · Admin</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
</head>
<body class="antialiased">

<aside th:replace="~{admin/fragments :: sidebar('users')}"></aside>

<div class="page-wrapper">
    <div class="page-header d-print-none">
        <div class="container-xl">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <h2 class="page-title">Users</h2>
                </div>
                <div class="col-auto ms-auto">
                    <a th:href="@{/admin/users/new}" class="btn btn-primary">
                        <i class="ti ti-plus me-1"></i> New User
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="container-xl">

            <div th:if="${success}" class="alert alert-success alert-dismissible" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-vcenter card-table">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Type</th>
                                <th>Roles</th>
                                <th>Active</th>
                                <th>MFA</th>
                                <th>Created</th>
                                <th>Last Login</th>
                                <th title="Failed attempts since last successful login">Failed</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td class="fw-medium" th:text="${u.email}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${u.authType.name() == 'LOCAL'} ? 'bg-secondary-lt text-secondary' : 'bg-cyan-lt text-cyan'"
                                          th:text="${u.authType}"></span>
                                </td>
                                <td>
                                    <span th:each="r : ${u.roles}" class="badge bg-dark me-1" th:text="${r}"></span>
                                </td>
                                <td>
                                    <span th:if="${u.active}" class="badge bg-success-lt text-success">Yes</span>
                                    <span th:unless="${u.active}" class="badge bg-secondary-lt text-secondary">No</span>
                                </td>
                                <td>
                                    <th:block th:if="${u.mfaEnabled}">
                                        <span th:if="${u.totpFailedAttempts >= 4}" class="badge bg-danger-lt text-danger">Locked</span>
                                        <span th:unless="${u.totpFailedAttempts >= 4}" class="badge bg-warning-lt text-warning">On</span>
                                    </th:block>
                                    <span th:unless="${u.mfaEnabled}" class="badge bg-secondary-lt text-secondary">Off</span>
                                </td>
                                <td class="text-muted small" th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd')}"></td>
                                <td class="text-muted small"
                                    th:text="${u.lastLoginAt != null} ? ${#temporals.format(u.lastLoginAt, 'yyyy-MM-dd HH:mm')} : '—'"></td>
                                <td class="text-muted small text-center">
                                    <span th:if="${u.authType.name() == 'FEDERATED'}">—</span>
                                    <span th:unless="${u.authType.name() == 'FEDERATED'}"
                                          th:class="${u.failedAttempts > 0} ? 'text-danger fw-medium' : ''"
                                          th:text="${u.failedAttempts}"></span>
                                </td>
                                <td class="text-end">
                                    <a th:href="@{/admin/users/{id}/edit(id=${u.id})}"
                                       class="btn btn-ghost-secondary btn-sm btn-icon me-1" title="Edit">
                                        <i class="ti ti-edit"></i>
                                    </a>
                                    <form th:if="${u.mfaEnabled and u.totpFailedAttempts >= 4}"
                                          th:action="@{/admin/users/{id}/unlock-totp(id=${u.id})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-ghost-primary btn-sm btn-icon me-1" title="Unlock TOTP">
                                            <i class="ti ti-lock-open"></i>
                                        </button>
                                    </form>
                                    <form th:if="${u.mfaEnabled}"
                                          th:action="@{/admin/users/{id}/reset-mfa(id=${u.id})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-ghost-warning btn-sm btn-icon me-1" title="Reset MFA"
                                                onclick="return confirm('Reset MFA for this user?')">
                                            <i class="ti ti-shield-x"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-ghost-danger btn-sm btn-icon" title="Delete"
                                                onclick="return confirm('Delete this user?')">
                                            <i class="ti ti-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="9" class="text-center text-muted py-4">No users found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
<script src="/js/theme.js"></script>
</body>
</html>
