<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied · nthNode</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card text-center" style="width: 420px;">
        <div class="card-body p-4 p-md-5">
            <div class="mb-3" style="font-size:3rem;">🚫</div>
            <h4 class="fw-semibold mb-2">Access Denied</h4>
            <p class="text-muted small mb-4">
                You don't have permission to access this application.
                Contact your administrator to request access.
            </p>
            <a th:href="@{/}" class="btn btn-primary">Back to home</a>
        </div>
    </div>

    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">
        <span id="themeIcon">☀️</span>
    </button>
    <script src="/js/theme.js"></script>
</body>
</html>
