<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Two-Factor Authentication · nthNode</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

    <div class="card" style="width: 460px;">
        <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
                <h4 class="fw-semibold mb-1">Set up authenticator</h4>
                <p class="text-muted small mb-0">
                    Scan the QR code with Google Authenticator, Authy, or any TOTP app,
                    then enter the 6-digit code to confirm.
                </p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
                Invalid code — please try again with the current code from your app.
            </div>

            <div id="qrcode" class="mb-3 text-center"></div>

            <div class="mb-4 text-center">
                <p class="text-muted small mb-1">Can't scan? Enter this key manually:</p>
                <code class="secret-key" th:text="${secret}">SECRET</code>
            </div>

            <form th:action="@{/mfa/enroll/confirm}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-4">
                    <label for="code" class="form-label fw-medium">Confirmation code</label>
                    <input type="text" class="form-control" id="code" name="code"
                           inputmode="numeric" autocomplete="one-time-code"
                           maxlength="6" placeholder="000000" autofocus required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Enable two-factor authentication</button>
            </form>

        </div>
    </div>

    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">
        <span id="themeIcon">☀️</span>
    </button>
    <script src="/js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script th:inline="javascript">
        new QRCode(document.getElementById("qrcode"), {
            text: /*[[${otpauthUri}]]*/ "",
            width: 200,
            height: 200,
            correctLevel: QRCode.CorrectLevel.M
        });
    </script>

</body>
</html>
