<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication · [[${serverName}]]</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card" style="width: 400px;">
        <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
                <h4 class="fw-semibold mb-1">Two-factor authentication</h4>
                <p class="text-muted small mb-0">Enter the 6-digit code from your authenticator app, or a recovery code.</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
                Invalid code. Please try again.
            </div>

            <form th:action="@{/mfa/challenge}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-4">
                    <label for="code" class="form-label fw-medium">Code</label>
                    <input type="text" class="form-control code-input" id="code" name="code"
                           inputmode="numeric" autocomplete="one-time-code"
                           maxlength="8" autofocus required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Verify</button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/logout}" class="text-muted small text-decoration-none">Sign in with a different account</a>
            </div>

        </div>
    </div>

    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">
        <span id="themeIcon">☀️</span>
    </button>
    <script src="/js/theme.js"></script>
</body>
</html>
