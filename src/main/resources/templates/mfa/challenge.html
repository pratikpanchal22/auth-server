<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: .75rem; }
        .code-input { letter-spacing: .3rem; font-size: 1.4rem; text-align: center; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card shadow-sm" style="width: 380px;">
        <div class="card-body p-4 p-md-5">

            <h4 class="fw-semibold mb-1">Two-factor authentication</h4>
            <p class="text-muted small mb-4">Enter the 6-digit code from your authenticator app, or a recovery code.</p>

            <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                Invalid code. Please try again.
            </div>

            <form th:action="@{/mfa/challenge}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-4">
                    <label for="code" class="form-label fw-medium">Code</label>
                    <input type="text" class="form-control code-input" id="code" name="code"
                           inputmode="numeric" autocomplete="one-time-code"
                           maxlength="8" autofocus required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Verify</button>
            </form>

            <div class="mt-3 text-center">
                <a href="/logout" class="text-muted small">Sign in with a different account</a>
            </div>

        </div>
    </div>

</body>
</html>
