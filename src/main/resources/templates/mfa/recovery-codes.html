<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Codes · nthNode</title>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

    <div class="card" style="width: 500px;">
        <div class="card-body p-4 p-md-5">

            <div class="text-center mb-3">
                <h4 class="fw-semibold mb-1">Save your recovery codes</h4>
                <p class="text-muted small mb-0">
                    Store these somewhere safe. Each code can be used <strong>once</strong>
                    if you lose access to your authenticator app.
                </p>
            </div>

            <div class="alert alert-warning py-2 small mb-4" role="alert">
                These codes will not be shown again.
            </div>

            <div class="code-grid mb-4">
                <span class="recovery-code" th:each="code : ${recoveryCodes}" th:text="${code}">XXXXXXXX</span>
            </div>

            <a th:href="@{/}" class="btn btn-primary w-100">I've saved my recovery codes</a>

        </div>
    </div>

    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">
        <span id="themeIcon">☀️</span>
    </button>
    <script src="/js/theme.js"></script>
</body>
</html>
