<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Codes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: .75rem; }
        .code-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
        .recovery-code { font-family: monospace; font-size: 1rem; letter-spacing: .1rem;
                         background: #e9ecef; padding: .4rem .7rem; border-radius: .4rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card shadow-sm" style="width: 480px;">
        <div class="card-body p-4 p-md-5">

            <h4 class="fw-semibold mb-1">Save your recovery codes</h4>
            <p class="text-muted small mb-1">
                Store these in a safe place. Each code can be used <strong>once</strong> to sign in
                if you lose access to your authenticator app.
            </p>
            <div class="alert alert-warning py-2 small mb-4" role="alert">
                These codes will not be shown again.
            </div>

            <div class="code-grid mb-4">
                <span class="recovery-code" th:each="code : ${recoveryCodes}" th:text="${code}">XXXXXXXX</span>
            </div>

            <a href="/" class="btn btn-primary w-100">I've saved my recovery codes</a>

        </div>
    </div>

</body>
</html>
