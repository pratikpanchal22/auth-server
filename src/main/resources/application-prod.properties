# Production profile — all sensitive values from environment variables

# Datasource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# Auth server public base URL — used in OIDC issuer claim
auth.server.base-url=${AUTH_SERVER_BASE_URL}

# AWS Secrets Manager ARNs — wired in PR-14 (production hardening)
# auth.signing-key-ref=${AUTH_SERVER_SIGNING_KEY_REF}
# auth.mfa.encryption-key-ref=${MFA_ENCRYPTION_KEY_REF}

logging.level.io.github.pratikpanchal22=INFO
management.endpoint.health.show-details=when-authorized
